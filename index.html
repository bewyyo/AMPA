                  <p style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>{m.nombre} <span style={{ fontWeight: 400, color: C.muted }}>· {m.email}</span></p>
                  <p style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 2, whiteSpace: "pre-wrap" }}>{m.mensaje}</p>
                  <p style={{ fontSize: 10.5, color: C.muted, marginTop: 3 }}>{fmtDate(m.fecha)}</p>
                </div>
              ))}
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  INFO AMPA (datos + horario)                                        */
/* ------------------------------------------------------------------ */
function InfoAMPA({ info, setInfo, role, notify, applyTheme, equipo, setEquipo }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState(info);
  const [subiendoLogo, setSubiendoLogo] = useState(false);
  const [colores, setColores] = useState({ green: C.green, yellow: C.yellow, coral: C.coral, paper: C.paper });
  const [modalEquipo, setModalEquipo] = useState(null);
  const [lightbox, setLightbox] = useState(null);

  useEffect(() => setForm(info), [info]);

  const handleLogo = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setSubiendoLogo(true);
    try { setForm({ ...form, logo: await fileToCompressedDataURL(file, 400, 0.85) }); }
    catch (err) { notify("No se pudo procesar el logo"); }
    setSubiendoLogo(false);
  };

  const guardarColores = () => { applyTheme(colores); notify("Colores actualizados"); };
  const restaurarColores = () => { setColores(DEFAULT_THEME); applyTheme(DEFAULT_THEME); notify("Colores restaurados"); };

  if (role === "admin" && editing) {
    return (
      <div>
        <SectionTitle>Editar datos del AMPA</SectionTitle>
        <Card>
          <Field label="Logotipo">
            <div className="flex items-center gap-3">
              {form.logo ? (
                <img src={form.logo} alt="Logo" className="w-14 h-14 rounded-xl object-cover" style={{ border: `1px solid ${C.border}` }} />
              ) : (
                <div className="w-14 h-14 rounded-xl flex items-center justify-center" style={{ background: C.greenSoft }}>
                  <ImageIcon size={20} color={C.muted} />
                </div>
              )}
              <div className="flex flex-col gap-1.5">
                <label>
                  <span className="inline-flex items-center gap-1.5 rounded-xl px-3 py-1.5 cursor-pointer" style={{ background: C.green, color: C.paper, fontWeight: 600, fontSize: 12.5 }}>
                    <Upload size={13} /> {subiendoLogo ? "Procesando…" : "Subir logo"}
                  </span>
                  <input type="file" accept="image/*" className="hidden" onChange={handleLogo} />
                </label>
                {form.logo && <button onClick={() => setForm({ ...form, logo: "" })} style={{ fontSize: 11.5, color: C.coral, fontWeight: 600 }}>Quitar logo</button>}
              </div>
            </div>
          </Field>
          <Field label="Nombre del AMPA"><Input value={form.nombre} onChange={(e) => setForm({ ...form, nombre: e.target.value })} /></Field>
          <Field label="Descripción"><TextArea value={form.descripcion} onChange={(e) => setForm({ ...form, descripcion: e.target.value })} /></Field>
          <Field label="Dirección"><Input value={form.direccion} onChange={(e) => setForm({ ...form, direccion: e.target.value })} /></Field>
          <Field label="Horario de atención"><Input value={form.horario} onChange={(e) => setForm({ ...form, horario: e.target.value })} /></Field>
          <Field label="Teléfono"><Input value={form.telefono} onChange={(e) => setForm({ ...form, telefono: e.target.value })} /></Field>
          <Field label="Email"><Input value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} /></Field>
          <Field label="Bizum"><Input value={form.bizum} onChange={(e) => setForm({ ...form, bizum: e.target.value })} /></Field>
          <Field label="IBAN"><Input value={form.iban} onChange={(e) => setForm({ ...form, iban: e.target.value })} /></Field>
          <div className="flex gap-2">
            <Btn onClick={() => { setInfo(form); setEditing(false); notify("Datos actualizados"); }}>Guardar</Btn>
            <Btn variant="ghost" onClick={() => setEditing(false)}>Cancelar</Btn>
          </div>
        </Card>

        <SectionTitle right={<Palette size={16} color={C.green} />}>Colores de la app</SectionTitle>
        <Card>
          <p style={{ fontSize: 12, color: C.inkSoft, marginBottom: 10 }}>Cambia la paleta de colores de toda la aplicación. Se aplica al momento.</p>
          <div className="grid grid-cols-2 gap-3">
            <ColorField label="Color principal" value={colores.green} onChange={(v) => setColores({ ...colores, green: v })} />
            <ColorField label="Color de acento" value={colores.yellow} onChange={(v) => setColores({ ...colores, yellow: v })} />
            <ColorField label="Color de alertas" value={colores.coral} onChange={(v) => setColores({ ...colores, coral: v })} />
            <ColorField label="Fondo" value={colores.paper} onChange={(v) => setColores({ ...colores, paper: v })} />
          </div>
          <div className="flex gap-2 mt-3">
            <Btn size="sm" onClick={guardarColores}>Aplicar colores</Btn>
            <Btn size="sm" variant="ghost" icon={RotateCcw} onClick={restaurarColores}>Restaurar</Btn>
          </div>
        </Card>
      </div>
    );
  }

  return (
    <div>
      <SectionTitle right={role === "admin" && <Btn size="sm" icon={Pencil} onClick={() => setEditing(true)}>Editar</Btn>}>El AMPA</SectionTitle>
      <Card>
        <div className="flex items-center gap-2 mb-2">
          {info.logo ? (
            <img src={info.logo} alt="Logo" className="w-9 h-9 rounded-lg object-cover" />
          ) : (
            <Building2 size={18} color={C.green} />
          )}
          <p style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 17, color: C.green }}>{info.nombre}</p>
        </div>
        <p style={{ fontSize: 13.5, color: C.inkSoft, whiteSpace: "pre-wrap" }}>{info.descripcion}</p>
        <div className="mt-3 space-y-1.5">
          <p style={{ fontSize: 13, color: C.ink }} className="flex items-center gap-2"><MapPin size={13} color={C.muted} />{info.direccion}</p>
          <p style={{ fontSize: 13, color: C.ink }} className="flex items-center gap-2"><Clock size={13} color={C.muted} />{info.horario}</p>
          <p style={{ fontSize: 13, color: C.ink }} className="flex items-center gap-2"><Phone size={13} color={C.muted} />{info.telefono}</p>
          <p style={{ fontSize: 13, color: C.ink }} className="flex items-center gap-2"><Mail size={13} color={C.muted} />{info.email}</p>
        </div>
      </Card>

      <SectionTitle right={role === "admin" && <Btn size="sm" icon={Plus} onClick={() => setModalEquipo("new")}>Añadir</Btn>}>Quiénes somos</SectionTitle>
      {equipo.length === 0 ? <Empty icon={Users} text="Todavía no se ha presentado el equipo del AMPA." /> : (
        <div className="space-y-2 mb-3">
          {equipo.map((m) => (
            <Card key={m.id}>
              <div className="flex items-center gap-3">
                {m.foto ? (
                  <img src={m.foto} alt={m.nombre} className="w-14 h-14 rounded-full object-cover shrink-0 cursor-pointer" onClick={() => setLightbox(m.foto)} />
                ) : (
                  <div className="w-14 h-14 rounded-full flex items-center justify-center shrink-0" style={{ background: C.greenSoft }}>
                    <Baby size={22} color={C.green} />
                  </div>
                )}
                <div className="flex-1">
                  <p style={{ fontWeight: 700, color: C.ink }}>{m.nombre}</p>
                  <Badge>{m.cargo}</Badge>
                  {m.bio && <p style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 4, whiteSpace: "pre-wrap" }}>{m.bio}</p>}
                </div>
                {role === "admin" && (
                  <div className="flex gap-1 shrink-0">
                    <button onClick={() => setModalEquipo(m)} className="p-1.5 rounded-lg" style={{ background: C.greenSoft }}><Pencil size={13} color={C.green} /></button>
                    <button onClick={() => setEquipo(equipo.filter((x) => x.id !== m.id))} className="p-1.5 rounded-lg" style={{ background: "#FBE9E7" }}><Trash2 size={13} color={C.coral} /></button>
                  </div>
                )}
              </div>
            </Card>
          ))}
        </div>
      )}

      <Card style={{ borderStyle: "dashed" }}>
        <p style={{ fontSize: 11.5, color: C.muted }}>
          Aviso: esta app guarda los datos de socios, eventos y pagos de forma compartida para que gestión y familias vean lo mismo.
          Es un prototipo — para un uso con datos reales de menores conviene revisar la protección de datos con un servidor propio.
        </p>
      </Card>

      {modalEquipo && (
        <EquipoForm initial={modalEquipo === "new" ? null : modalEquipo} notify={notify} onClose={() => setModalEquipo(null)} onSave={(d) => {
          if (modalEquipo === "new") setEquipo([...equipo, { ...d, id: uid() }]);
          else setEquipo(equipo.map((x) => (x.id === modalEquipo.id ? { ...x, ...d } : x)));
          setModalEquipo(null); notify("Guardado");
        }} />
      )}
      {lightbox && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.85)" }} onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" className="max-w-full max-h-full rounded-xl" />
        </div>
      )}
    </div>
  );
}

function EquipoForm({ initial, onClose, onSave, notify }) {
  const [nombre, setNombre] = useState(initial?.nombre || "");
  const [cargo, setCargo] = useState(initial?.cargo || "");
  const [bio, setBio] = useState(initial?.bio || "");
  const [foto, setFoto] = useState(initial?.foto || "");
  return (
    <Modal title={initial ? "Editar integrante" : "Nuevo integrante"} onClose={onClose}>
      <Field label="Nombre"><Input value={nombre} onChange={(e) => setNombre(e.target.value)} /></Field>
      <Field label="Cargo"><Input value={cargo} onChange={(e) => setCargo(e.target.value)} placeholder="Presidenta, Tesorero, Vocal…" /></Field>
      <Field label="Breve presentación (opcional)"><TextArea value={bio} onChange={(e) => setBio(e.target.value)} /></Field>
      <ImageField value={foto} onChange={setFoto} notify={notify} label="Foto (opcional)" />
      <Btn full onClick={() => onSave({ nombre, cargo, bio, foto })} disabled={!nombre}>Guardar</Btn>
    </Modal>
  );
}

function ColorField({ label, value, onChange }) {
  return (
    <label className="flex items-center gap-2">
      <input type="color" value={value} onChange={(e) => onChange(e.target.value)}
        className="w-9 h-9 rounded-lg cursor-pointer" style={{ border: `1px solid ${C.border}`, padding: 2 }} />
      <span style={{ fontSize: 12, color: C.inkSoft, fontWeight: 600 }}>{label}</span>
    </label>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AMPAApp />);


</script>

<script>
  window.addEventListener('load', function() {
    var loader = document.getElementById('initial-loader');
    if (loader) setTimeout(function() { loader.style.display = 'none'; }, 400);
  });

  if ('serviceWorker' in navigator) {
    var swCode = "self.addEventListener('install', e => self.skipWaiting());" +
      "self.addEventListener('activate', e => self.clients.claim());" +
      "self.addEventListener('fetch', e => {" +
      "  e.respondWith(" +
      "    fetch(e.request).then(res => {" +
      "      var resClone = res.clone();" +
      "      caches.open('ampa-shell-v1').then(cache => cache.put(e.request, resClone));" +
      "      return res;" +
      "    }).catch(() => caches.match(e.request))" +
      "  );" +
      "});";
    var blob = new Blob([swCode], { type: 'text/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(err) {
      console.warn('No se pudo registrar el service worker', err);
    });
  }
</script>
