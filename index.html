<script>
  function showError(msg) {
    var box = document.getElementById('error-box');
    var loader = document.getElementById('initial-loader');
    if (loader) loader.style.display = 'none';
    if (box) { box.style.display = 'block'; box.textContent = 'Error:\n\n' + msg; }
  }
  window.addEventListener('error', function(e) { showError((e.error && e.error.stack) || e.message); });

// Sistema de prioridad para listas de espera de eventos:
// las familias que ayudan en tareas (decoración/recogida) van primero;
// las que tienen "no presentados" en eventos anteriores van al final.
const normEntry = (x) => (typeof x === "string" ? { socioId: x, ts: 0, confirmado: false, asistencia: null } : x);
const contarNoShows = (socioId, eventos) =>
  eventos.reduce((total, ev) => total + (ev.inscritos || []).map(normEntry).filter((i) => i.socioId === socioId && i.asistencia === "no").length, 0);
const priorityScore = (socio, eventos) => {
  if (!socio) return 5;
  let score = 0;
  if ((socio.tareas || []).length > 0) score -= 10;
  score += 10 * contarNoShows(socio.id, eventos || []);
  return score;
};
const ordenarPorPrioridad = (entries, socios, eventos) =>
  [...entries].sort((a, b) => {
    const sa = socios.find((s) => s.id === a.socioId), sb = socios.find((s) => s.id === b.socioId);
    const diff = priorityScore(sa, eventos) - priorityScore(sb, eventos);
    return diff !== 0 ? diff : (a.ts || 0) - (b.ts || 0);
  });


function fileToCompressedDataURL(file, maxDim = 900, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new window.Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width * scale); height = Math.round(height * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

      if (!data) return fallback;
      const { theme, ...info } = data.data || {};
      return { ...fallback, ...info };
    }

    if (key === "ampa:theme") {
      const { data } = await supa.from("ampa_info").select("data").eq("id", "main").maybeSingle();
      return data?.data?.theme || fallback;
    }

    if (key === "ampa:socios") {

      if (error || !data) return fallback;

      if (!data) return fallback;
      return { tipo: data.tipo, dataUrl: data.data_url, nombre: data.nombre };
    }

    if (key === "ampa:eventos") {
      const { data, error } = await supa.from("eventos").select("*, inscripciones(*)").order("fecha");
      if (error || !data) return fallback;
      return data.map((ev) => {

  }

/* ------------------------------------------------------------------ */
/*  GENERADOR DE CÓDIGO QR (autónomo, sin llamadas de red)             */
/*  Implementación mínima del estándar QR: modo byte, nivel de         */
/*  corrección L, versiones 1-4, máscara fija 0. Suficiente para       */
/*  cadenas cortas como "SOCIO-1234".                                  */
/* ------------------------------------------------------------------ */
const GF_EXP = new Array(512);
const GF_LOG = new Array(256);
(function initGF() {
  let x = 1;
  for (let i = 0; i < 255; i++) {
    GF_EXP[i] = x; GF_LOG[x] = i;
    x <<= 1; if (x & 0x100) x ^= 0x11d;
  }
  for (let i = 255; i < 512; i++) GF_EXP[i] = GF_EXP[i - 255];
})();
const gfMul = (a, b) => (a === 0 || b === 0) ? 0 : GF_EXP[GF_LOG[a] + GF_LOG[b]];

function rsGeneratorPoly(degree) {
  let g = [1];
  for (let i = 0; i < degree; i++) {
    const next = new Array(g.length + 1).fill(0);
    for (let j = 0; j < g.length; j++) {
      next[j] ^= g[j];
      next[j + 1] ^= gfMul(g[j], GF_EXP[i]);
    }
    g = next;
  }
  return g;
}
function rsEncode(dataBytes, ecCount) {
  const gen = rsGeneratorPoly(ecCount);
  const msg = dataBytes.concat(new Array(ecCount).fill(0));
  for (let i = 0; i < dataBytes.length; i++) {
    const coef = msg[i];
    if (coef !== 0) {
      for (let j = 0; j < gen.length; j++) msg[i + j] ^= gfMul(gen[j], coef);
    }
  }
  return msg.slice(dataBytes.length);
}

const QR_DATA_CAPACITY = { 1: 19, 2: 34, 3: 55, 4: 80 };
const QR_EC_CODEWORDS = { 1: 7, 2: 10, 3: 15, 4: 20 };
const QR_ALIGN_POS = { 1: [], 2: [6, 18], 3: [6, 22], 4: [6, 26] };

function pickVersion(byteLen) {
  for (const v of [1, 2, 3, 4]) {
    const capBits = QR_DATA_CAPACITY[v] * 8;
    if (12 + 8 * byteLen <= capBits) return v;
  }
  return 4;
}

function encodeByteMode(text, version) {
  const bytes = Array.from(new TextEncoder().encode(text)).slice(0, QR_DATA_CAPACITY[version] - 2);
  const bits = [];
  const push = (val, len) => { for (let i = len - 1; i >= 0; i--) bits.push((val >> i) & 1); };
  push(0b0100, 4);
  push(bytes.length, 8);
  bytes.forEach((b) => push(b, 8));
  const capBits = QR_DATA_CAPACITY[version] * 8;
  const term = Math.min(4, Math.max(0, capBits - bits.length));
  push(0, term);
  while (bits.length % 8 !== 0) bits.push(0);
  const dataBytes = [];
  for (let i = 0; i < bits.length; i += 8) {
    let byte = 0; for (let j = 0; j < 8; j++) byte = (byte << 1) | bits[i + j];
    dataBytes.push(byte);
  }
  const pad = [0xec, 0x11]; let p = 0;
  while (dataBytes.length < capBits / 8) { dataBytes.push(pad[p % 2]); p++; }
  return dataBytes;
}

function formatBCH(data5) {
  let d = data5 << 10;
  const g = 0b10100110111;
  const degree = (n) => { let deg = -1; while (n) { deg++; n >>>= 1; } return deg; };
  const gDeg = degree(g);
  while (degree(d) >= gDeg) d ^= g << (degree(d) - gDeg);
  return ((data5 << 10) | d) ^ 0b101010000010010;
}

function generateQRMatrix(text) {
  const version = pickVersion(new TextEncoder().encode(text).length);
  const size = version * 4 + 17;
  const matrix = Array.from({ length: size }, () => Array(size).fill(0));
  const reserved = Array.from({ length: size }, () => Array(size).fill(false));
  const set = (r, c, v) => { if (r >= 0 && r < size && c >= 0 && c < size) { matrix[r][c] = v; reserved[r][c] = true; } };

  const placeFinder = (r0, c0) => {
    for (let i = -1; i <= 7; i++) for (let j = -1; j <= 7; j++) {
      const r = r0 + i, c = c0 + j;
      if (r < 0 || r >= size || c < 0 || c >= size) continue;
      let val = 0;
      if (i >= 0 && i <= 6 && j >= 0 && j <= 6) {
        if (i === 0 || i === 6 || j === 0 || j === 6) val = 1;
        else if (i >= 2 && i <= 4 && j >= 2 && j <= 4) val = 1;
      }
      set(r, c, val);
    }
  };
  placeFinder(0, 0); placeFinder(0, size - 7); placeFinder(size - 7, 0);

  for (let i = 8; i < size - 8; i++) {
    if (!reserved[6][i]) set(6, i, i % 2 === 0 ? 1 : 0);
    if (!reserved[i][6]) set(i, 6, i % 2 === 0 ? 1 : 0);
  }

  const positions = QR_ALIGN_POS[version] || [];
  for (const r of positions) for (const c of positions) {
    if ((r <= 8 && c <= 8) || (r <= 8 && c >= size - 9) || (r >= size - 9 && c <= 8)) continue;
    for (let i = -2; i <= 2; i++) for (let j = -2; j <= 2; j++) {
      set(r + i, c + j, Math.max(Math.abs(i), Math.abs(j)) === 1 ? 0 : 1);
    }
  }

  set(4 * version + 9, 8, 1);

  for (let i = 0; i <= 8; i++) { if (!reserved[8][i]) set(8, i, 0); if (!reserved[i][8]) set(i, 8, 0); }
  for (let i = 0; i < 8; i++) { set(8, size - 1 - i, 0); set(size - 1 - i, 8, 0); }

  const ecCount = QR_EC_CODEWORDS[version];
  const dataBytes = encodeByteMode(text, version);
  const ecBytes = rsEncode(dataBytes, ecCount);
  const allBits = [];
  dataBytes.concat(ecBytes).forEach((byte) => { for (let i = 7; i >= 0; i--) allBits.push((byte >> i) & 1); });

  let bitIndex = 0, dirUp = true;
  for (let col = size - 1; col > 0; col -= 2) {
    if (col === 6) col--;
    for (let i = 0; i < size; i++) {
      const row = dirUp ? size - 1 - i : i;
      for (const c of [col, col - 1]) {
        if (reserved[row][c]) continue;
        const bit = bitIndex < allBits.length ? allBits[bitIndex] : 0;
        bitIndex++;
        const invert = (row + c) % 2 === 0;
        matrix[row][c] = invert ? bit ^ 1 : bit;
      }
    }
    dirUp = !dirUp;
  }

  const fmt = formatBCH(0b01000); // EC level L (01) + máscara 0 (000)
  const bit = (i) => (fmt >> (14 - i)) & 1;
  const first = [[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
  const second = [[size-1,8],[size-2,8],[size-3,8],[size-4,8],[size-5,8],[size-6,8],[size-7,8],
    [8,size-8],[8,size-7],[8,size-6],[8,size-5],[8,size-4],[8,size-3],[8,size-2],[8,size-1]];
  first.forEach(([r, c], i) => { matrix[r][c] = bit(i); });
  second.forEach(([r, c], i) => { matrix[r][c] = bit(i); });

  return matrix;
}

function QRCode({ value, size = 100 }) {
  const matrix = useMemo(() => generateQRMatrix(value), [value]);
  const n = matrix.length;
  const quiet = 4;
  const total = n + quiet * 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${total} ${total}`} shapeRendering="crispEdges">
      <rect width={total} height={total} fill="#fff" />
      {matrix.map((row, r) => row.map((v, c) => (v ? <rect key={`${r}-${c}`} x={c + quiet} y={r + quiet} width={1} height={1} fill="#000" /> : null)))}
    </svg>
  );
}

function ImageField({ value, onChange, notify, label = "Foto (opcional)" }) {
  const [subiendo, setSubiendo] = useState(false);
  const handle = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setSubiendo(true);
    try { onChange(await fileToCompressedDataURL(file)); } catch (err) { notify && notify("No se pudo procesar la imagen"); }
    setSubiendo(false);
  };
  return (
    <Field label={label}>
      {value ? (
        <div className="relative">
          <img src={value} alt="preview" className="w-full rounded-xl" style={{ maxHeight: 160, objectFit: "cover" }} />
          <button onClick={() => onChange("")} className="absolute top-2 right-2 p-1.5 rounded-full" style={{ background: "rgba(0,0,0,0.55)" }}>

function AMPAApp() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("inicio");
  const [session, setSession] = useState(null);
  const [perfil, setPerfil] = useState(null); // { socio_id, is_admin }
  const [toast, setToast] = useState(null);

  const [info, setInfo] = useState(seedInfo);
  const [socios, setSocios] = useState([]);
  const [eventos, setEventos] = useState([]);
  const [comunicados, setComunicados] = useState([]);
  const [pagos, setPagos] = useState([]);
  const [extraescolares, setExtraescolares] = useState([]);
  const [colaboradores, setColaboradores] = useState([]);
  const [calendario, setCalendario] = useState([]);
  const [mensajes, setMensajes] = useState([]);
  const [calendarioArchivo, setCalendarioArchivo] = useState(null);
  const [equipo, setEquipo] = useState([]);
  const [, setThemeTick] = useState(0);

  const notify = (text) => { setToast(text); setTimeout(() => setToast(null), 2400); };

  /* ---------------- Sesión ---------------- */
  useEffect(() => {
    supa.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = supa.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    (async () => {
      if (!session) { setPerfil(null); setLoading(false); return; }
      const { data } = await supa.from("perfiles").select("socio_id, is_admin").eq("id", session.user.id).maybeSingle();
      setPerfil(data || { socio_id: null, is_admin: false });
    })();
  }, [session]);

  /* ---------------- Carga de datos (solo si hay sesión) ---------------- */
  useEffect(() => {
    if (!session || !perfil) return;
    (async () => {
      setLoading(true);
      const [i, s, e, c, p, ex, col, cal, msg, calArch, eq, theme] = await Promise.all([
        loadKey("ampa:info", seedInfo),
        loadKey("ampa:socios", seedSocios),
        loadKey("ampa:eventos", seedEventos),
        loadKey("ampa:comunicados", seedComunicados),
        loadKey("ampa:pagos", []),
        loadKey("ampa:extraescolares", seedExtraescolares),
        loadKey("ampa:colaboradores", seedColaboradores),
        loadKey("ampa:calendario", seedCalendario),
        loadKey("ampa:mensajes", []),
        loadKey("ampa:calendarioArchivo", null),
        loadKey("ampa:equipo", seedEquipo),
        loadKey("ampa:theme", null),
      ]);
      if (theme) Object.assign(C, theme);
      setInfo(i); setSocios(s); setEventos(e); setComunicados(c); setPagos(p);
      setExtraescolares(ex); setColaboradores(col); setCalendario(cal);
      setMensajes(msg); setCalendarioArchivo(calArch); setEquipo(eq);
      setLoading(false);
    })();
  }, [session, perfil]);

  const applyTheme = (colors) => {
    Object.assign(C, colors);
    saveKey("ampa:theme", { ...colors }, true);
    setThemeTick((t) => t + 1);
  };

  // helpers de guardado genéricos (guardan en Supabase y actualizan el estado local)
  const persist = {
    info: (v) => { setInfo(v); saveKey("ampa:info", v); },
    socios: (v) => { const prev = socios; setSocios(v); saveKey("ampa:socios", v, true, prev); },
    eventos: (v) => { const prev = eventos; setEventos(v); saveKey("ampa:eventos", v, true, prev); },
    comunicados: (v) => { const prev = comunicados; setComunicados(v); saveKey("ampa:comunicados", v, true, prev); },
    pagos: (v) => { const prev = pagos; setPagos(v); saveKey("ampa:pagos", v, true, prev); },
    extraescolares: (v) => { const prev = extraescolares; setExtraescolares(v); saveKey("ampa:extraescolares", v, true, prev); },
    colaboradores: (v) => { const prev = colaboradores; setColaboradores(v); saveKey("ampa:colaboradores", v, true, prev); },
    calendario: (v) => { const prev = calendario; setCalendario(v); saveKey("ampa:calendario", v, true, prev); },
    calendarioArchivo: (v) => { setCalendarioArchivo(v); saveKey("ampa:calendarioArchivo", v); },
    equipo: (v) => { const prev = equipo; setEquipo(v); saveKey("ampa:equipo", v, true, prev); },
    mensajes: (v) => { const prev = mensajes; setMensajes(v); saveKey("ampa:mensajes", v, true, prev); },
  };

  const role = perfil?.is_admin ? "admin" : "socio";
  const me = socios.find((s) => s.id === perfil?.socio_id) || null;
  const logout = () => supa.auth.signOut();

  const TABS = [
    { id: "inicio", label: "Inicio", icon: Home },
    { id: "carnet", label: "Carnet", icon: CreditCard },
    { id: "comunicados", label: "Comunicados", icon: Megaphone },
    { id: "eventos", label: "Eventos", icon: CalendarDays },
    { id: "pagos", label: "Pagos", icon: Wallet },
    { id: "extraescolares", label: "Extraescolares", icon: GraduationCap },
    { id: "colaboradores", label: "Colaboradores", icon: Handshake },
    { id: "calendario", label: "Calendario", icon: CalendarClock },
    { id: "agenda", label: "Agenda", icon: ListChecks },
    { id: "contacto", label: "Contacto", icon: Mail },
    { id: "info", label: "El AMPA", icon: Info },
    ...(role === "admin" ? [{ id: "socios", label: "Socios", icon: Users }] : []),
  ];

  if (loading) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.paper }}>
        <style>{FONT_IMPORT}</style>
        <p style={{ fontFamily: "'Space Grotesk', sans-serif", color: C.green }}>Cargando AMPA…</p>
      </div>
    );
  }

  if (!session) {
    return (
      <div className="min-h-screen" style={{ background: C.paper, fontFamily: "'Space Grotesk', sans-serif" }}>
        <style>{FONT_IMPORT}</style>
        <AuthScreen info={info} notify={notify} />
        {toast && (
          <div className="fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2 z-50"
            style={{ background: C.green, color: C.paper }}>
            <CheckCircle2 size={15} color={C.yellow} />
            <span style={{ fontSize: 13, fontWeight: 600 }}>{toast}</span>
          </div>
        )}
      </div>
    );
  }

  if (role === "socio" && !me) {
    return (
      <div className="min-h-screen" style={{ background: C.paper, fontFamily: "'Space Grotesk', sans-serif" }}>
        <style>{FONT_IMPORT}</style>
        <VincularSocio info={info} notify={notify} onLinked={() => window.location.reload()} onLogout={logout} />
      </div>
    );
  }

  return (
    <div className="min-h-screen" style={{ background: C.paper, fontFamily: "'Space Grotesk', sans-serif" }}>
      <style>{FONT_IMPORT}</style>

      {/* HEADER */}
      <div style={{ background: C.green }} className="px-4 pt-4 pb-0">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2">
            {info.logo ? (
              <img src={info.logo} alt="Logo" className="w-8 h-8 rounded-full object-cover" style={{ border: `1.5px solid ${C.yellow}` }} />
            ) : (
              <div className="w-8 h-8 rounded-full flex items-center justify-center" style={{ background: C.yellow }}>
                <Baby size={17} color={C.green} />
              </div>
            )}
            <div>
              <p style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 16.5, color: C.paper, lineHeight: 1.1 }}>
                {info.nombre}
              </p>
              <p style={{ fontSize: 11, color: "#BFD1C7" }}>{role === "admin" ? "Modo gestión" : "Área de familias"}</p>
            </div>
          </div>
          <button onClick={logout} className="flex items-center gap-1 px-2.5 py-1.5 rounded-full" style={{ background: "rgba(255,255,255,0.12)" }}>
            <Unlock size={13} color="#BFD1C7" />
            <span style={{ fontSize: 11.5, color: "#BFD1C7", fontWeight: 600 }}>Salir</span>
          </button>
        </div>
        {/* TABS */}
        <div className="flex gap-1 overflow-x-auto pb-0" style={{ scrollbarWidth: "none" }}>
          {TABS.map((t) => (
            <Tab key={t.id} active={tab === t.id} icon={t.icon} label={t.label} onClick={() => setTab(t.id)} />
          ))}
        </div>
      </div>

      {/* CONTENIDO */}
      <div className="max-w-2xl mx-auto px-4 py-5 pb-16">
        {tab === "inicio" && (
          <Inicio info={info} eventos={eventos} comunicados={comunicados} calendario={calendario}
            role={role} me={me} pagos={pagos} socios={socios} setTab={setTab} />
        )}
        {tab === "carnet" && (
          <Carnet socios={socios} setSocios={persist.socios} role={role} me={me} info={info} notify={notify} />
        )}
        {tab === "socios" && role === "admin" && (
          <Socios socios={socios} setSocios={persist.socios} notify={notify} />
        )}
        {tab === "comunicados" && (
          <Comunicados comunicados={comunicados} setComunicados={persist.comunicados} role={role} notify={notify} />
        )}
        {tab === "eventos" && (
          <Eventos eventos={eventos} setEventos={persist.eventos} role={role} me={me} socios={socios}
            pagos={pagos} setPagos={persist.pagos} notify={notify} />
        )}
        {tab === "pagos" && (
          <Pagos pagos={pagos} setPagos={persist.pagos} role={role} me={me} socios={socios} info={info} notify={notify} />
        )}
        {tab === "extraescolares" && (
          <Extraescolares lista={extraescolares} setLista={persist.extraescolares} role={role} notify={notify} />
        )}
        {tab === "colaboradores" && (
          <Colaboradores lista={colaboradores} setLista={persist.colaboradores} role={role} notify={notify} />
        )}
        {tab === "calendario" && (
          <Calendario calendario={calendario} setCalendario={persist.calendario} role={role} notify={notify}
            archivo={calendarioArchivo} setArchivo={persist.calendarioArchivo} />
        )}
        {tab === "agenda" && (
          <Agenda eventos={eventos} calendario={calendario} comunicados={comunicados} />
        )}
        {tab === "contacto" && (
          <Contacto info={info} mensajes={mensajes} setMensajes={persist.mensajes} role={role} notify={notify} />
        )}
        {tab === "info" && (
          <InfoAMPA info={info} setInfo={persist.info} role={role} notify={notify} applyTheme={applyTheme}
            equipo={equipo} setEquipo={persist.equipo} />
        )}
      </div>

      {/* TOAST */}
      {toast && (
        <div className="fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2 z-50"
          style={{ background: C.green, color: C.paper }}>
          <CheckCircle2 size={15} color={C.yellow} />
          <span style={{ fontSize: 13, fontWeight: 600 }}>{toast}</span>
        </div>
      )}
    </div>
  );
}

/*  LOGIN DE FAMILIAS (email + contraseña, con Supabase Auth)          */
/* ------------------------------------------------------------------ */
function AuthScreen({ info, notify }) {
  const [modo, setModo] = useState("entrar"); // 'entrar' | 'crear' | 'reset'
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [numeroSocio, setNumeroSocio] = useState("");
  const [error, setError] = useState("");
  const [cargando, setCargando] = useState(false);
  const [mensajeOk, setMensajeOk] = useState("");

  const entrar = async () => {
    setError(""); setCargando(true);
    const { error: err } = await supa.auth.signInWithPassword({ email, password });
    setCargando(false);
    if (err) setError("Email o contraseña incorrectos");
  };

  const crearCuenta = async () => {
    setError(""); setCargando(true);
    const { error: err } = await supa.auth.signUp({ email, password });
    setCargando(false);
    if (err) { setError(err.message); return; }
    setMensajeOk("Cuenta creada. Si tu proyecto pide confirmar el email, revisa tu bandeja de entrada y luego inicia sesión.");
    setModo("entrar");
  };

  const pedirReset = async () => {
    setError(""); setCargando(true);
    const { error: err } = await supa.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
    setCargando(false);
    if (err) { setError(err.message); return; }
    setMensajeOk("Te hemos enviado un email con un enlace para restablecer tu contraseña.");
  };

  return (
    <div className="min-h-screen flex flex-col justify-center px-6" style={{ maxWidth: 420, margin: "0 auto" }}>
      <div className="text-center mb-6">
        {info.logo ? (
          <img src={info.logo} alt="Logo" className="w-16 h-16 rounded-2xl object-cover mx-auto mb-3" />
        ) : (
          <div className="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-3" style={{ background: C.green }}>
            <Baby size={28} color={C.yellow} />
          </div>
        )}
        <p style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 21, color: C.green }}>{info.nombre}</p>
        <p style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 2 }}>
          {modo === "entrar" ? "Accede con tu email y contraseña" : modo === "crear" ? "Crea tu cuenta de familia" : "Recuperar contraseña"}
        </p>
      </div>
      <Card>
        {mensajeOk && <p style={{ fontSize: 12.5, color: C.green, marginBottom: 10, fontWeight: 600 }}>{mensajeOk}</p>}
        <Field label="Email"><Input type="email" value={email} onChange={(e) => { setEmail(e.target.value); setError(""); }} placeholder="tu@email.com" /></Field>
        {modo !== "reset" && (
          <Field label="Contraseña"><Input type="password" value={password} onChange={(e) => { setPassword(e.target.value); setError(""); }}
            onKeyDown={(e) => e.key === "Enter" && (modo === "entrar" ? entrar() : crearCuenta())} /></Field>
        )}
        {error && <p style={{ fontSize: 12.5, color: C.coral, marginBottom: 8 }}>{error}</p>}

        {modo === "entrar" && <Btn full onClick={entrar} disabled={!email || !password || cargando}>{cargando ? "Entrando…" : "Entrar"}</Btn>}
        {modo === "crear" && <Btn full onClick={crearCuenta} disabled={!email || !password || cargando}>{cargando ? "Creando…" : "Crear cuenta"}</Btn>}
        {modo === "reset" && <Btn full onClick={pedirReset} disabled={!email || cargando}>{cargando ? "Enviando…" : "Enviar enlace"}</Btn>}

        <div className="flex flex-col items-center gap-1.5 mt-3">
          {modo !== "entrar" && <button onClick={() => { setModo("entrar"); setError(""); setMensajeOk(""); }} style={{ fontSize: 12, color: C.green, fontWeight: 600 }}>Ya tengo cuenta: iniciar sesión</button>}
          {modo !== "crear" && <button onClick={() => { setModo("crear"); setError(""); setMensajeOk(""); }} style={{ fontSize: 12, color: C.green, fontWeight: 600 }}>Primera vez: crear mi cuenta</button>}
          {modo !== "reset" && <button onClick={() => { setModo("reset"); setError(""); setMensajeOk(""); }} style={{ fontSize: 11.5, color: C.muted }}>He olvidado mi contraseña</button>}

      </Card>
      <p style={{ fontSize: 11, color: C.muted, marginTop: 14, textAlign: "center" }}>

      </p>

  );
}

function VincularSocio({ info, notify, onLinked, onLogout }) {
  const [numero, setNumero] = useState("");
  const [error, setError] = useState("");
  const [cargando, setCargando] = useState(false);

  const vincular = async () => {
    setError(""); setCargando(true);
    const { error: err } = await supa.rpc("link_my_socio", { p_numero_socio: Number(numero) });
    setCargando(false);
    if (err) { setError(err.message); return; }
    notify("¡Cuenta vinculada!");
    onLinked();
  };

  return (
    <div className="min-h-screen flex flex-col justify-center px-6" style={{ maxWidth: 420, margin: "0 auto" }}>
      <div className="text-center mb-6">
        <p style={{ fontFamily: "'Fraunces', serif", fontWeight: 700, fontSize: 20, color: C.green }}>Un último paso</p>
        <p style={{ fontSize: 12.5, color: C.inkSoft, marginTop: 4 }}>
          Escribe tu número de socio para vincular tu cuenta con tu familia. Debe coincidir con el email que usaste al registrarte.
        </p>
      </div>
      <Card>
        <Field label="Número de socio"><Input inputMode="numeric" value={numero} onChange={(e) => { setNumero(e.target.value); setError(""); }} placeholder="Ej. 12"
          onKeyDown={(e) => e.key === "Enter" && vincular()} /></Field>
        {error && <p style={{ fontSize: 12.5, color: C.coral, marginBottom: 8 }}>{error}</p>}
        <Btn full onClick={vincular} disabled={!numero || cargando}>{cargando ? "Comprobando…" : "Vincular"}</Btn>
      </Card>
      <button onClick={onLogout} className="mt-6 flex items-center justify-center gap-1.5" style={{ color: C.muted, fontSize: 12 }}>
        Cerrar sesión
      </button>
    </div>
  );
}

function CambiarPin({ me, notify }) {
  const [abierto, setAbierto] = useState(false);
  const [nuevo, setNuevo] = useState("");
  const [error, setError] = useState("");
  const [cargando, setCargando] = useState(false);

  const guardar = async () => {
    if (nuevo.length < 6) { setError("La contraseña debe tener al menos 6 caracteres"); return; }
    setCargando(true);
    const { error: err } = await supa.auth.updateUser({ password: nuevo });
    setCargando(false);
    if (err) { setError(err.message); return; }
    setAbierto(false); setNuevo(""); setError("");
    notify("Contraseña actualizada");
  };

  return (
    <Card className="mt-3">
      <p style={{ fontSize: 12.5, fontWeight: 700, color: C.ink, marginBottom: 8 }}>Mi perfil</p>
      {abierto ? (
        <div>
          <Field label="Contraseña nueva (mínimo 6 caracteres)"><Input type="password" value={nuevo} onChange={(e) => setNuevo(e.target.value)} /></Field>
          {error && <p style={{ fontSize: 12, color: C.coral, marginBottom: 8 }}>{error}</p>}
          <div className="flex gap-2">
            <Btn size="sm" onClick={guardar} disabled={cargando}>{cargando ? "Guardando…" : "Guardar"}</Btn>
            <Btn size="sm" variant="ghost" onClick={() => { setAbierto(false); setError(""); }}>Cancelar</Btn>
          </div>
        </div>
      ) : (
        <button onClick={() => setAbierto(true)} className="flex items-center gap-2" style={{ fontSize: 13, color: C.green, fontWeight: 600 }}>
          <Lock size={14} /> Cambiar mi contraseña
        </button>
      )}
    </Card>
  );
}

/*  SOCIOS (admin): tabla + import Excel                               */
/* ------------------------------------------------------------------ */
function Socios({ socios, setSocios, notify }) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null); // 'new' | socio object
  const [importing, setImporting] = useState(false);

  const filtered = socios.filter((s) =>
    `${familiaLabel(s)} ${s.numeroSocio} ${s.familiar1?.email} ${s.familiar2?.email}`.toLowerCase().includes(search.toLowerCase())
  );

  const downloadTemplate = () => {
    const ws = XLSX.utils.json_to_sheet([
      {
        NumeroSocio: 1, TipoSocio: "antiguo",
        Familiar1_Nombre: "Ana García", Familiar1_Email: "ana@example.com", Familiar1_Telefono: "600111222",
        Familiar2_Nombre: "Luis Martín", Familiar2_Email: "luis@example.com", Familiar2_Telefono: "600333444",
        Alumno1_Nombre: "Sofía", Alumno1_Curso: "2º Primaria", Alumno1_Letra: "A",
        Alumno2_Nombre: "Diego", Alumno2_Curso: "5º Infantil", Alumno2_Letra: "B",
        Alumno3_Nombre: "", Alumno3_Curso: "", Alumno3_Letra: "", Alumno4_Nombre: "", Alumno4_Curso: "", Alumno4_Letra: "", Alumno5_Nombre: "", Alumno5_Curso: "", Alumno5_Letra: "",
      },
    ]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Socios");
    XLSX.writeFile(wb, "plantilla_socios_ampa.xlsx");
  };

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImporting(true);
    try {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
      const nuevos = rows.map((r, idx) => {
        const hijos = [];
        for (let i = 1; i <= 5; i++) {
          const n = r[`Alumno${i}_Nombre`];
          const c = r[`Alumno${i}_Curso`];
          const l = r[`Alumno${i}_Letra`];
          if (n) hijos.push({ nombre: String(n), curso: String(c || ""), letra: String(l || "") });
        }
        return {
          id: uid(),
          numeroSocio: r.NumeroSocio || socios.length + idx + 1,
          tipoSocio: String(r.TipoSocio || "antiguo").toLowerCase().includes("nuevo") ? "nuevo" : "antiguo",
          familiar1: { nombre: String(r.Familiar1_Nombre || ""), email: String(r.Familiar1_Email || ""), telefono: String(r.Familiar1_Telefono || "") },
          familiar2: { nombre: String(r.Familiar2_Nombre || ""), email: String(r.Familiar2_Email || ""), telefono: String(r.Familiar2_Telefono || "") },
          hijos,
          fechaAlta: todayISO(),
          tareas: [],
          noShows: 0,
        };
      });
      setSocios([...socios, ...nuevos]);
      notify(`${nuevos.length} familias importadas. Cada familia deberá crear su propia cuenta con su email y vincularla con su número de socio.`);
    } catch (err) {
      notify("No se pudo leer el archivo. Revisa el formato.");
    }
    setImporting(false);
    e.target.value = "";
  };

  const toggleTarea = (s, tarea) => {
    const tareas = s.tareas || [];
    const nuevas = tareas.includes(tarea) ? tareas.filter((t) => t !== tarea) : [...tareas, tarea];
    setSocios(socios.map((x) => (x.id === s.id ? { ...x, tareas: nuevas } : x)));
  };

  return (
    <div>
      <SectionTitle right={<Btn size="sm" icon={Plus} onClick={() => setModal("new")}>Añadir</Btn>}>Socios ({socios.length})</SectionTitle>

      <Card className="mb-3">
        <p style={{ fontSize: 12.5, color: C.inkSoft, marginBottom: 8 }}>Importa todas las familias de golpe desde un Excel, o descarga la plantilla con el formato correcto.</p>
        <div className="flex gap-2 flex-wrap">
          <label>
            <span className="inline-flex items-center gap-1.5 rounded-xl px-3 py-2 cursor-pointer" style={{ background: C.green, color: C.paper, fontWeight: 600, fontSize: 13 }}>
              <Upload size={15} /> {importing ? "Importando…" : "Importar Excel"}
            </span>
            <input type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={handleFile} />
          </label>
          <Btn variant="ghost" size="sm" icon={Download} onClick={downloadTemplate}>Descargar plantilla</Btn>
        </div>
        <p style={{ fontSize: 10.5, color: C.muted, marginTop: 6 }}>
          Después de importar, cada familia debe crear su propia cuenta (email + contraseña) desde la pantalla de acceso y vincularla con su número de socio.
        </p>
      </Card>

      <div className="relative mb-3">
        <Search size={15} className="absolute left-3 top-1/2 -translate-y-1/2" color={C.muted} />
        <Input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar por familia, número o email…" style={{ paddingLeft: 32 }} />
      </div>

      {filtered.length === 0 ? <Empty icon={Users} text="No se han encontrado socios." /> : (
        <div className="space-y-2">
          {filtered.sort((a, b) => a.numeroSocio - b.numeroSocio).map((s) => (
            <Card key={s.id}>
              <div className="flex items-start justify-between gap-2">
                <div>
                  <p style={{ fontWeight: 700, color: C.ink }}>Nº {s.numeroSocio} · {familiaLabel(s)}
                    {s.tipoSocio === "nuevo" && <Badge bg={C.yellow} color={C.green}> Nuevo</Badge>}
                  </p>
                  <p style={{ fontSize: 12, color: C.inkSoft, marginTop: 2 }}>{s.familiar1?.telefono} {s.familiar1?.email && `· ${s.familiar1.email}`}</p>
                  {(s.familiar2?.nombre) && <p style={{ fontSize: 12, color: C.inkSoft }}>{s.familiar2.nombre} · {s.familiar2.telefono} {s.familiar2.email && `· ${s.familiar2.email}`}</p>}
                  <div className="mt-1.5 flex flex-wrap gap-1">
                    {(s.hijos || []).map((h, i) => <Badge key={i}>{h.nombre} ({h.curso}{h.letra ? ` ${h.letra}` : ""})</Badge>)}
                  </div>
                  <div className="mt-2 flex flex-wrap items-center gap-1.5">
                    {s.noShows > 0 && <Badge color={C.coral} bg="#FBE9E7">{s.noShows} no presentado(s)</Badge>}
                  </div>
                  <div className="mt-1.5 flex flex-wrap gap-1.5">
                    <button onClick={() => toggleTarea(s, "decoracion")} className="px-2 py-0.5 rounded-full" style={{ fontSize: 10.5, fontWeight: 600, background: (s.tareas || []).includes("decoracion") ? C.yellow : C.paperDark, color: (s.tareas || []).includes("decoracion") ? C.green : C.muted }}>Ayuda en decoración</button>
                    <button onClick={() => toggleTarea(s, "recogida")} className="px-2 py-0.5 rounded-full" style={{ fontSize: 10.5, fontWeight: 600, background: (s.tareas || []).includes("recogida") ? C.yellow : C.paperDark, color: (s.tareas || []).includes("recogida") ? C.green : C.muted }}>Ayuda en recogidas</button>
                  </div>
                </div>
                <div className="flex gap-1 shrink-0">
                  <button onClick={() => setModal(s)} className="p-1.5 rounded-lg" style={{ background: C.greenSoft }}><Pencil size={13} color={C.green} /></button>
                  <button onClick={() => setSocios(socios.filter((x) => x.id !== s.id))} className="p-1.5 rounded-lg" style={{ background: "#FBE9E7" }}><Trash2 size={13} color={C.coral} /></button>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}

      {modal && (
        <SocioForm
          initial={modal === "new" ? null : modal}
          onClose={() => setModal(null)}
          onSave={(data) => {
            if (modal === "new") setSocios([...socios, { ...data, id: uid(), fechaAlta: todayISO(), tareas: [], noShows: 0 }]);
            else setSocios(socios.map((s) => (s.id === modal.id ? { ...s, ...data } : s)));
            setModal(null);
          }}
          nextNumero={Math.max(0, ...socios.map((s) => s.numeroSocio)) + 1}
        />
      )}
    </div>
  );
}

function SocioForm({ initial, onClose, onSave, nextNumero }) {
  const [numeroSocio, setNumeroSocio] = useState(initial?.numeroSocio || nextNumero);
  const [tipoSocio, setTipoSocio] = useState(initial?.tipoSocio || "nuevo");
  const [f1Nombre, setF1Nombre] = useState(initial?.familiar1?.nombre || "");
  const [f1Email, setF1Email] = useState(initial?.familiar1?.email || "");
  const [f1Tel, setF1Tel] = useState(initial?.familiar1?.telefono || "");
  const [f2Nombre, setF2Nombre] = useState(initial?.familiar2?.nombre || "");
  const [f2Email, setF2Email] = useState(initial?.familiar2?.email || "");
  const [f2Tel, setF2Tel] = useState(initial?.familiar2?.telefono || "");
  const [hijos, setHijos] = useState(initial?.hijos?.length ? initial.hijos : [{ nombre: "", curso: "", letra: "" }]);

  const updateHijo = (i, field, val) => {
    const copy = [...hijos]; copy[i] = { ...copy[i], [field]: val }; setHijos(copy);
  };

  return (
    <Modal title={initial ? "Editar socio" : "Nuevo socio"} onClose={onClose}>
      <Field label="Número de socio"><Input type="number" value={numeroSocio} onChange={(e) => setNumeroSocio(Number(e.target.value))} /></Field>
      <Field label="Tipo de socio">
        <Select value={tipoSocio} onChange={(e) => setTipoSocio(e.target.value)}>
          <option value="nuevo">Nuevo</option>
          <option value="antiguo">Antiguo</option>
        </Select>
      </Field>

      <p style={{ fontSize: 12.5, fontWeight: 700, color: C.inkSoft, marginBottom: 6, marginTop: 10 }}>Familiar 1</p>
      <Field label="Nombre"><Input value={f1Nombre} onChange={(e) => setF1Nombre(e.target.value)} /></Field>
      <Field label="Email"><Input value={f1Email} onChange={(e) => setF1Email(e.target.value)} /></Field>
      <Field label="Teléfono"><Input value={f1Tel} onChange={(e) => setF1Tel(e.target.value)} /></Field>

      <p style={{ fontSize: 12.5, fontWeight: 700, color: C.inkSoft, marginBottom: 6, marginTop: 10 }}>Familiar 2 (opcional)</p>
      <Field label="Nombre"><Input value={f2Nombre} onChange={(e) => setF2Nombre(e.target.value)} /></Field>
      <Field label="Email"><Input value={f2Email} onChange={(e) => setF2Email(e.target.value)} /></Field>
      <Field label="Teléfono"><Input value={f2Tel} onChange={(e) => setF2Tel(e.target.value)} /></Field>

      <p style={{ fontSize: 12.5, fontWeight: 700, color: C.inkSoft, marginBottom: 6, marginTop: 10 }}>Alumnos/as (hasta 5)</p>
      {hijos.map((h, i) => (
        <div key={i} className="flex gap-2 mb-2">
          <div className="flex-1" style={{ minWidth: 0 }}><Input placeholder={`Alumno ${i + 1}: nombre`} value={h.nombre} onChange={(e) => updateHijo(i, "nombre", e.target.value)} /></div>
          <div style={{ width: 110, flexShrink: 0 }}><Input placeholder="Curso" value={h.curso} onChange={(e) => updateHijo(i, "curso", e.target.value)} /></div>
          <div style={{ width: 56, flexShrink: 0 }}><Input placeholder="Letra" value={h.letra} onChange={(e) => updateHijo(i, "letra", e.target.value)} /></div>
        </div>
      ))}
      {hijos.length < 5 && (
        <Btn variant="ghost" size="sm" icon={Plus} onClick={() => setHijos([...hijos, { nombre: "", curso: "", letra: "" }])}>Añadir alumno/a</Btn>
      )}
      <div className="mt-4">
        <Btn full onClick={() => onSave({
          numeroSocio, tipoSocio,
          familiar1: { nombre: f1Nombre, email: f1Email, telefono: f1Tel },
          familiar2: { nombre: f2Nombre, email: f2Email, telefono: f2Tel },
          hijos: hijos.filter((h) => h.nombre),
        })} disabled={!f1Nombre}>Guardar</Btn>
      </div>
    </Modal>
  );
}

/* ------------------------------------------------------------------ */
/*  COMUNICADOS                                                        */
/* ------------------------------------------------------------------ */
function Comunicados({ comunicados, setComunicados, role, notify }) {
  const [modal, setModal] = useState(null); // null | 'new' | comunicado
  const [titulo, setTitulo] = useState("");
  const [mensaje, setMensaje] = useState("");
  const [foto, setFoto] = useState("");
  const [subiendo, setSubiendo] = useState(false);
  const [lightbox, setLightbox] = useState(null);

  const abrirNuevo = () => { setTitulo(""); setMensaje(""); setFoto(""); setModal("new"); };
  const abrirEditar = (c) => { setTitulo(c.titulo); setMensaje(c.mensaje); setFoto(c.foto || ""); setModal(c); };

  const handleFoto = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setSubiendo(true);
    try { setFoto(await fileToCompressedDataURL(file)); } catch (err) { notify("No se pudo procesar la imagen"); }
    setSubiendo(false);
  };

  const guardar = () => {
    if (modal === "new") {
      setComunicados([{ id: uid(), titulo, mensaje, foto, fecha: todayISO() }, ...comunicados]);
      notify("Comunicado publicado");
    } else {
      setComunicados(comunicados.map((c) => (c.id === modal.id ? { ...c, titulo, mensaje, foto } : c)));
      notify("Comunicado actualizado");
    }
    setModal(null);
  };

  return (
    <div>
      <SectionTitle right={role === "admin" && <Btn size="sm" icon={Plus} onClick={abrirNuevo}>Nuevo</Btn>}>Comunicados</SectionTitle>
      {comunicados.length === 0 ? <Empty icon={Megaphone} text="Todavía no hay comunicados." /> : (
        <div className="space-y-3">
          {[...comunicados].sort((a, b) => b.fecha.localeCompare(a.fecha)).map((c) => (
            <Card key={c.id} style={{ padding: 0, overflow: "hidden" }}>
              {c.foto && (
                <img src={c.foto} alt={c.titulo} className="w-full cursor-pointer" style={{ maxHeight: 340, objectFit: "contain", background: C.paperDark }} onClick={() => setLightbox(c.foto)} />
              )}
              <div className="p-4">
                <div className="flex items-center justify-between">
                  <p style={{ fontWeight: 700, color: C.ink }}>{c.titulo}</p>
                  {role === "admin" && (
                    <div className="flex gap-1 shrink-0">
                      <button onClick={() => abrirEditar(c)} className="p-1 rounded-lg" style={{ background: C.greenSoft }}>
                        <Pencil size={12} color={C.green} />
                      </button>
                      <button onClick={() => setComunicados(comunicados.filter((x) => x.id !== c.id))} className="p-1 rounded-lg" style={{ background: "#FBE9E7" }}>
                        <Trash2 size={12} color={C.coral} />
                      </button>
                    </div>
                  )}
                </div>
                <p style={{ fontSize: 13, color: C.inkSoft, marginTop: 3, whiteSpace: "pre-wrap" }}>{c.mensaje}</p>
                <p style={{ fontSize: 11, color: C.muted, marginTop: 6 }}>{fmtDate(c.fecha)}</p>
              </div>
            </Card>
          ))}
        </div>
      )}
      {modal && (
        <Modal title={modal === "new" ? "Nuevo comunicado" : "Editar comunicado"} onClose={() => setModal(null)}>
          <Field label="Título"><Input value={titulo} onChange={(e) => setTitulo(e.target.value)} /></Field>
          <Field label="Mensaje"><TextArea value={mensaje} onChange={(e) => setMensaje(e.target.value)} style={{ minHeight: 130 }} /></Field>
          <Field label="Foto (opcional)">
            {foto ? (
              <div className="relative">
                <img src={foto} alt="preview" className="w-full rounded-xl" style={{ maxHeight: 160, objectFit: "cover" }} />
                <button onClick={() => setFoto("")} className="absolute top-2 right-2 p-1.5 rounded-full" style={{ background: "rgba(0,0,0,0.55)" }}>
                  <X size={13} color="#fff" />
                </button>
              </div>
            ) : (
              <label>
                <span className="inline-flex items-center gap-1.5 rounded-xl px-3 py-2 cursor-pointer" style={{ background: C.greenSoft, color: C.green, fontWeight: 600, fontSize: 13 }}>
                  <Camera size={15} /> {subiendo ? "Procesando…" : "Subir foto"}
                </span>
                <input type="file" accept="image/*" className="hidden" onChange={handleFoto} />
              </label>
            )}
          </Field>
          <Btn full onClick={guardar} disabled={!titulo || !mensaje} icon={Send}>
            {modal === "new" ? "Publicar a todas las familias" : "Guardar cambios"}
          </Btn>
        </Modal>
      )}
      {lightbox && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.85)" }} onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" className="max-w-full max-h-full rounded-xl" />
        </div>
      )}
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  BLOG: novedades y actividades con fotos                            */
/* ------------------------------------------------------------------ */
function Eventos({ eventos, setEventos, role, me, socios, pagos, setPagos, notify }) {
  const [modal, setModal] = useState(null); // 'new' | evento
  const [verInscritos, setVerInscritos] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [subiendoFoto, setSubiendoFoto] = useState(null);

  const addFoto = async (evento, file) => {
    if (!file) return;
    setSubiendoFoto(evento.id);
    try {
      const dataUrl = await fileToCompressedDataURL(file);
      setEventos(eventos.map((e) => (e.id === evento.id ? { ...e, fotos: [...(e.fotos || []), dataUrl] } : e)));
      notify("Foto añadida");
    } catch (err) { notify("No se pudo procesar la imagen"); }
    setSubiendoFoto(null);
  };
  const quitarFoto = (evento, idx) => {
    setEventos(eventos.map((e) => (e.id === evento.id ? { ...e, fotos: e.fotos.filter((_, i) => i !== idx) } : e)));
  };

  const apuntar = (evento) => {
    if (!me) return notify("Selecciona tu carnet primero");
    const inscritos = (evento.inscritos || []).map(normEntry);
    const espera = (evento.espera || []).map(normEntry);
    if (inscritos.some((x) => x.socioId === me.id) || espera.some((x) => x.socioId === me.id)) return;
    const entry = { socioId: me.id, ts: Date.now(), confirmado: false, asistencia: null };
    const hayPlaza = inscritos.length < evento.plazas;
    const updated = hayPlaza
      ? { ...evento, inscritos: [...inscritos, entry], espera }
      : { ...evento, inscritos, espera: ordenarPorPrioridad([...espera, entry], socios, eventos) };
    setEventos(eventos.map((e) => (e.id === evento.id ? updated : e)));
    if (hayPlaza && evento.precio > 0) {
      setPagos([...pagos, { id: uid(), socioId: me.id, concepto: `Evento: ${evento.titulo}`, importe: evento.precio, estado: "pendiente", fecha: todayISO() }]);
    }
    notify(hayPlaza ? "¡Inscripción realizada!" : "Añadido a la lista de espera");
  };

  const baja = (evento) => {
    if (!me) return;
    const inscritosOrig = (evento.inscritos || []).map(normEntry);
    let inscritos = inscritosOrig.filter((x) => x.socioId !== me.id);
    let espera = (evento.espera || []).map(normEntry).filter((x) => x.socioId !== me.id);
    const eraInscrito = inscritosOrig.some((x) => x.socioId === me.id);
    if (eraInscrito && espera.length > 0 && inscritos.length < evento.plazas) {
      inscritos = [...inscritos, espera[0]];
      espera = espera.slice(1);
    }
    setEventos(eventos.map((e) => (e.id === evento.id ? { ...e, inscritos, espera } : e)));
    notify("Baja realizada");
  };

  const marcarAsistencia = (evento, socioId, valor) => {
    const inscritos = (evento.inscritos || []).map(normEntry).map((x) => (x.socioId === socioId ? { ...x, asistencia: valor } : x));
    const updated = { ...evento, inscritos };
    setEventos(eventos.map((e) => (e.id === evento.id ? updated : e)));
    setVerInscritos(updated);
  };

  const confirmarDesdeGestion = (evento, socioId) => {
    const inscritos = (evento.inscritos || []).map(normEntry).map((x) => (x.socioId === socioId ? { ...x, confirmado: true } : x));
    const updated = { ...evento, inscritos };
    setEventos(eventos.map((e) => (e.id === evento.id ? updated : e)));
    setVerInscritos(updated);
    notify("Asistencia confirmada");
  };

  return (
    <div>
      <SectionTitle right={role === "admin" && <Btn size="sm" icon={Plus} onClick={() => setModal("new")}>Nuevo</Btn>}>Eventos</SectionTitle>
      {eventos.length === 0 ? <Empty icon={CalendarDays} text="No hay eventos programados." /> : (
        <div className="space-y-3">
          {[...eventos].sort((a, b) => a.fecha.localeCompare(b.fecha)).map((ev) => {
            const inscritos = (ev.inscritos || []).map(normEntry);
            const espera = (ev.espera || []).map(normEntry);
            const miEntry = me && inscritos.find((x) => x.socioId === me.id);
            const yoEspera = me && espera.some((x) => x.socioId === me.id);
            const lleno = inscritos.length >= ev.plazas;
            return (
              <Card key={ev.id}>
                <div className="flex items-start justify-between">
                  <div>
                    <p style={{ fontWeight: 700, color: C.ink, fontSize: 15.5 }}>{ev.titulo}</p>
                    <p style={{ fontSize: 12, color: C.inkSoft, marginTop: 2 }}>{fmtDateLong(ev.fecha)}</p>
                    <p style={{ fontSize: 12, color: C.inkSoft }} className="flex items-center gap-1"><MapPin size={11} />{ev.lugar}</p>
                  </div>
                  {ev.precio > 0 && <Badge color={C.green} bg={C.yellow}>{euros(ev.precio)}</Badge>}
                </div>
                <p style={{ fontSize: 13, color: C.inkSoft, marginTop: 6, whiteSpace: "pre-wrap" }}>{ev.descripcion}</p>
                {(ev.fotos || []).length > 0 && (
                  <div className="flex gap-2 mt-3 overflow-x-auto">
                    {ev.fotos.map((f, i) => (
                      <div key={i} className="relative shrink-0">
                        <img src={f} alt="" className="w-16 h-16 rounded-lg object-cover cursor-pointer" onClick={() => setLightbox(f)} />
                        {role === "admin" && (
                          <button onClick={() => quitarFoto(ev, i)} className="absolute -top-1 -right-1 p-0.5 rounded-full" style={{ background: C.coral }}>
                            <X size={10} color="#fff" />
                          </button>
                        )}
                      </div>
                    ))}
                  </div>
                )}
                <div className="flex items-center gap-2 mt-3">
                  <Badge>{inscritos.length}/{ev.plazas} plazas</Badge>
                  {espera.length > 0 && <Badge color={C.coral} bg="#FBE9E7">{espera.length} en espera</Badge>}
                  {miEntry?.confirmado && <Badge color={C.green} bg={C.greenSoft}>Asistencia confirmada</Badge>}
                </div>
                <div className="flex gap-2 mt-3 flex-wrap">
                  {role === "socio" && (
                    miEntry ? (
                      <Btn size="sm" variant="danger" onClick={() => baja(ev)}>Darme de baja</Btn>
                    ) : yoEspera ? (
                      <Btn size="sm" variant="danger" onClick={() => baja(ev)}>Salir de la lista de espera</Btn>
                    ) : (
                      <Btn size="sm" variant={lleno ? "ghost" : "accent"} onClick={() => apuntar(ev)}>{lleno ? "Unirme a lista de espera" : "Apuntarme"}</Btn>
                    )
                  )}
                  {role === "admin" && (
                    <>
                      <Btn size="sm" variant="ghost" icon={ListChecks} onClick={() => setVerInscritos(ev)}>Ver inscritos</Btn>
                      <Btn size="sm" variant="ghost" icon={Pencil} onClick={() => setModal(ev)}>Editar</Btn>
                      <label>
                        <span className="inline-flex items-center gap-1.5 rounded-xl px-3 py-1.5 cursor-pointer" style={{ border: `1.5px solid ${C.green}`, color: C.green, fontWeight: 600, fontSize: 12.5 }}>
                          <Camera size={13} /> {subiendoFoto === ev.id ? "Subiendo…" : "Foto"}
                        </span>
                        <input type="file" accept="image/*" className="hidden" onChange={(e) => addFoto(ev, e.target.files[0])} />
                      </label>
                      <Btn size="sm" variant="danger" icon={Trash2} onClick={() => setEventos(eventos.filter((e) => e.id !== ev.id))}>Eliminar</Btn>
                    </>
                  )}
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {modal && (
        <EventoForm
          initial={modal === "new" ? null : modal}
          onClose={() => setModal(null)}
          onSave={(data) => {
            if (modal === "new") setEventos([...eventos, { ...data, id: uid(), inscritos: [], espera: [], fotos: [] }]);
            else setEventos(eventos.map((e) => (e.id === modal.id ? { ...e, ...data } : e)));
            setModal(null);
          }}
        />
      )}

      {verInscritos && (
        <Modal title={`Inscritos: ${verInscritos.titulo}`} onClose={() => setVerInscritos(null)}>
          <p style={{ fontSize: 12, fontWeight: 700, color: C.inkSoft, marginBottom: 6 }}>CONFIRMADOS ({(verInscritos.inscritos || []).length})</p>
          {(verInscritos.inscritos || []).length === 0 ? <p style={{ fontSize: 13, color: C.muted }}>Nadie inscrito todavía.</p> :
            (verInscritos.inscritos || []).map(normEntry).map((entry) => {
              const s = socios.find((x) => x.id === entry.socioId);
              return (
                <div key={entry.socioId} className="py-2" style={{ borderBottom: `1px solid ${C.border}` }}>
                  <div className="flex items-center justify-between">
                    <div>
                      <p style={{ fontSize: 13.5, fontWeight: 600, color: C.ink }}>{s ? `${familiaLabel(s)} (nº ${s.numeroSocio})` : "—"}</p>
                      {s && <p style={{ fontSize: 11.5, color: C.inkSoft }}>{s.familiar1?.telefono} {s.familiar1?.email && `· ${s.familiar1.email}`}</p>}
                    </div>
                    {entry.confirmado && <Badge color={C.green} bg={C.greenSoft}>Confirmado</Badge>}
                  </div>
                  <div className="flex gap-1.5 mt-1.5 flex-wrap">
                    {!entry.confirmado && <button onClick={() => confirmarDesdeGestion(verInscritos, entry.socioId)} className="px-2 py-0.5 rounded-full" style={{ fontSize: 10.5, fontWeight: 600, background: C.yellow, color: C.green }}>Confirmar asistencia</button>}
                    <button onClick={() => marcarAsistencia(verInscritos, entry.socioId, "si")} className="px-2 py-0.5 rounded-full" style={{ fontSize: 10.5, fontWeight: 600, background: entry.asistencia === "si" ? C.greenSoft : C.paperDark, color: entry.asistencia === "si" ? C.green : C.muted }}>Asistió</button>
                    <button onClick={() => marcarAsistencia(verInscritos, entry.socioId, "no")} className="px-2 py-0.5 rounded-full" style={{ fontSize: 10.5, fontWeight: 600, background: entry.asistencia === "no" ? "#FBE9E7" : C.paperDark, color: entry.asistencia === "no" ? C.coral : C.muted }}>No se presentó</button>
                  </div>
                </div>
              );
            })}
          {(verInscritos.espera || []).length > 0 && (
            <>
              <p style={{ fontSize: 12, fontWeight: 700, color: C.inkSoft, marginTop: 12, marginBottom: 6 }}>LISTA DE ESPERA, por orden ({(verInscritos.espera || []).length})</p>
              {(verInscritos.espera || []).map(normEntry).map((entry, i) => {
                const s = socios.find((x) => x.id === entry.socioId);
                const prioridad = s && (s.tareas || []).length > 0;
                const penalizado = s && contarNoShows(s.id, eventos) > 0;
                return (
                  <div key={entry.socioId} className="py-1.5" style={{ borderBottom: `1px solid ${C.border}` }}>
                    <p style={{ fontSize: 13.5 }}>{i + 1}. {s ? `${familiaLabel(s)} (nº ${s.numeroSocio})` : "—"}
                      {prioridad && <Badge bg={C.yellow} color={C.green}> Ayuda en tareas</Badge>}
                      {penalizado && <Badge color={C.coral} bg="#FBE9E7"> Penalizado</Badge>}
                    </p>
                  </div>
                );
              })}
            </>
          )}
        </Modal>
      )}
      {lightbox && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.85)" }} onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" className="max-w-full max-h-full rounded-xl" />
        </div>
      )}
    </div>
  );
}

function EventoForm({ initial, onClose, onSave }) {
  const [titulo, setTitulo] = useState(initial?.titulo || "");
  const [fecha, setFecha] = useState(initial?.fecha || todayISO());
  const [lugar, setLugar] = useState(initial?.lugar || "");
  const [descripcion, setDescripcion] = useState(initial?.descripcion || "");
  const [precio, setPrecio] = useState(initial?.precio || 0);
  const [plazas, setPlazas] = useState(initial?.plazas || 30);

  return (
    <Modal title={initial ? "Editar evento" : "Nuevo evento"} onClose={onClose}>
      <Field label="Título"><Input value={titulo} onChange={(e) => setTitulo(e.target.value)} /></Field>
      <Field label="Fecha"><Input type="date" value={fecha} onChange={(e) => setFecha(e.target.value)} /></Field>
      <Field label="Lugar"><Input value={lugar} onChange={(e) => setLugar(e.target.value)} /></Field>
      <Field label="Descripción"><TextArea value={descripcion} onChange={(e) => setDescripcion(e.target.value)} /></Field>
      <div className="flex gap-2">
        <Field label="Precio (€, 0 si es gratis)"><Input type="number" value={precio} onChange={(e) => setPrecio(Number(e.target.value))} /></Field>
        <Field label="Plazas"><Input type="number" value={plazas} onChange={(e) => setPlazas(Number(e.target.value))} /></Field>
      </div>
      <Btn full onClick={() => onSave({ titulo, fecha, lugar, descripcion, precio, plazas })} disabled={!titulo || !fecha}>Guardar</Btn>
    </Modal>
  );
}

/* ------------------------------------------------------------------ */
/*  PAGOS (bizum / transferencia, gestión manual de estado)            */
/* ------------------------------------------------------------------ */
function Pagos({ pagos, setPagos, role, me, socios, info, notify }) {
  const [modal, setModal] = useState(false);
  const [socioId, setSocioId] = useState("");
  const [concepto, setConcepto] = useState("");
  const [importe, setImporte] = useState("");
  const [filtro, setFiltro] = useState("todos");
  const [justificando, setJustificando] = useState(null); // pago sobre el que se está adjuntando justificante
  const [subiendoJust, setSubiendoJust] = useState(false);
  const [lightbox, setLightbox] = useState(null);

  const misPagos = me ? pagos.filter((p) => p.socioId === me.id) : [];
  const lista = role === "admin" ? pagos : misPagos;
  const filtrada = filtro === "todos" ? lista : lista.filter((p) => p.estado === filtro);

  const confirmarAdmin = (p, estado) => { setPagos(pagos.map((x) => (x.id === p.id ? { ...x, estado } : x))); notify(estado === "pagado" ? "Pago confirmado" : "Marcado como pendiente"); };

  const subirJustificante = async (file) => {
    if (!file || !justificando) return;
    setSubiendoJust(true);
    try {
      let justificante;
      if (file.type === "application/pdf") {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        justificante = { tipo: "pdf", dataUrl, nombre: file.name };
      } else {
        justificante = { tipo: "imagen", dataUrl: await fileToCompressedDataURL(file), nombre: file.name };
      }
      setPagos(pagos.map((x) => (x.id === justificando.id ? { ...x, estado: "revisar", justificante } : x)));
      notify("Justificante adjuntado, a la espera de confirmación");
    } catch (err) { notify("No se pudo procesar el archivo"); }
    setSubiendoJust(false);
    setJustificando(null);
  };

  const nuevoPago = () => {
    setPagos([...pagos, { id: uid(), socioId, concepto, importe: Number(importe), estado: "pendiente", fecha: todayISO() }]);
    setModal(false); setSocioId(""); setConcepto(""); setImporte(""); notify("Cargo añadido");
  };

  const estadoInfo = { pendiente: { color: C.coral, bg: "#FBE9E7", label: "Pendiente" }, revisar: { color: C.blue, bg: "#E4EDF5", label: "Notificado, a revisar" }, pagado: { color: C.green, bg: C.greenSoft, label: "Pagado" } };

  return (
    <div>
      <SectionTitle right={role === "admin" && <Btn size="sm" icon={Plus} onClick={() => setModal(true)}>Nuevo cargo</Btn>}>Pagos</SectionTitle>

      <Card className="mb-3" style={{ background: C.greenSoft, border: "none" }}>
        <p style={{ fontSize: 12.5, fontWeight: 700, color: C.green }}>Datos para pagar por Bizum o transferencia</p>
        <p style={{ fontSize: 13, color: C.ink, marginTop: 3 }}>Bizum: <b>{info.bizum}</b></p>
        <p style={{ fontSize: 13, color: C.ink }}>IBAN: <b>{info.iban}</b></p>
        <p style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 3 }}>Indica siempre el concepto y el número de socio en el pago.</p>
      </Card>

      <div className="flex gap-1.5 mb-3">
        {["todos", "pendiente", "revisar", "pagado"].map((f) => (
          <button key={f} onClick={() => setFiltro(f)} className="px-2.5 py-1 rounded-full" style={{ background: filtro === f ? C.green : C.paperDark, color: filtro === f ? C.paper : C.inkSoft, fontSize: 11.5, fontWeight: 600 }}>
            {f === "todos" ? "Todos" : estadoInfo[f].label}
          </button>
        ))}
      </div>

function Calendario({ calendario, setCalendario, role, notify, archivo, setArchivo }) {
  const [modal, setModal] = useState(null);
  const [subiendoArchivo, setSubiendoArchivo] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  const ordenado = [...calendario].sort((a, b) => a.fecha.localeCompare(b.fecha));

  const importarOficial = () => {
    const existentes = new Set(calendario.map((c) => c.fecha + "|" + c.titulo));
    const nuevos = OFICIAL_MADRID_26_27.filter((d) => !existentes.has(d.fecha + "|" + d.titulo)).map((d) => ({ ...d, id: uid() }));
    if (nuevos.length === 0) { notify("Ya estaban todas las fechas importadas"); return; }
    setCalendario([...calendario, ...nuevos]);
    notify(`${nuevos.length} fechas importadas del calendario oficial de Madrid`);
  };

  const handleArchivo = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 4.5 * 1024 * 1024) { notify("El archivo pesa demasiado (máx. ~4 MB)"); return; }
    setSubiendoArchivo(true);
    try {
      if (file.type === "application/pdf") {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        setArchivo({ tipo: "pdf", dataUrl, nombre: file.name });
      } else {
        const dataUrl = await fileToCompressedDataURL(file, 1400, 0.82);
        setArchivo({ tipo: "imagen", dataUrl, nombre: file.name });
      }
      notify("Calendario adjuntado");
    } catch (err) { notify("No se pudo procesar el archivo"); }
    setSubiendoArchivo(false);
  };

  return (
    <div>
      <SectionTitle right={role === "admin" && <Btn size="sm" icon={Plus} onClick={() => setModal("new")}>Añadir</Btn>}>Calendario escolar</SectionTitle>

      {role === "admin" && (
        <Card className="mb-3" style={{ background: C.greenSoft, border: "none" }}>
          <p style={{ fontSize: 12.5, fontWeight: 700, color: C.green }}>Calendario oficial de Madrid (curso 26/27)</p>
          <p style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 2 }}>
            Importa de una vez los festivos, puentes y vacaciones oficiales de la Comunidad de Madrid (aplican también a Torrejón de Ardoz), en vez de añadirlos a mano.
          </p>
          <div className="mt-2"><Btn size="sm" icon={Download} onClick={importarOficial}>Importar fechas oficiales</Btn></div>
          <p style={{ fontSize: 10.5, color: C.muted, marginTop: 6 }}>
            Nota: los 2 festivos locales propios de Torrejón para 2027 aún no estaban publicados al crear esta app — añádelos en cuanto el Ayuntamiento los anuncie.
          </p>
        </Card>
      )}

      <Card className="mb-3">
        <p style={{ fontSize: 12.5, fontWeight: 700, color: C.ink, marginBottom: 6 }}>Calendario en imagen o PDF</p>
        {archivo ? (
          <div>
            {archivo.tipo === "imagen" ? (
              <img src={archivo.dataUrl} alt="Calendario escolar" className="w-full rounded-xl cursor-pointer" style={{ maxHeight: 320, objectFit: "contain", background: C.paperDark }} onClick={() => setLightbox(archivo.dataUrl)} />
            ) : (
              <a href={archivo.dataUrl} download={archivo.nombre || "calendario.pdf"} className="inline-flex items-center gap-1.5 rounded-xl px-3 py-2" style={{ background: C.green, color: C.paper, fontWeight: 600, fontSize: 13 }}>
                <Download size={15} /> Ver / descargar PDF
              </a>
            )}
            {role === "admin" && (
              <div className="mt-2"><Btn size="sm" variant="danger" icon={Trash2} onClick={() => setArchivo(null)}>Quitar archivo</Btn></div>
            )}
          </div>
        ) : role === "admin" ? (
          <label>
            <span className="inline-flex items-center gap-1.5 rounded-xl px-3 py-2 cursor-pointer" style={{ background: C.green, color: C.paper, fontWeight: 600, fontSize: 13 }}>
              <Upload size={15} /> {subiendoArchivo ? "Subiendo…" : "Adjuntar imagen o PDF"}
            </span>
            <input type="file" accept="image/*,application/pdf" className="hidden" onChange={handleArchivo} />
          </label>
        ) : (
          <p style={{ fontSize: 12.5, color: C.muted }}>Todavía no se ha adjuntado el calendario oficial.</p>
        )}
      </Card>

      {ordenado.length === 0 ? <Empty icon={CalendarClock} text="No hay fechas en el calendario." /> : (
        <div className="space-y-2">
          {ordenado.map((c) => {
            const ti = TIPO_INFO[c.tipo] || TIPO_INFO.centro;
            return (
              <Card key={c.id}>
                <div className="flex items-center justify-between">
                  <div>
                    <p style={{ fontWeight: 700, color: C.ink, fontSize: 14 }}>{c.titulo}</p>
                    <p style={{ fontSize: 12, color: C.inkSoft, textTransform: "capitalize" }}>{fmtDateLong(c.fecha)}</p>
                  </div>
                  <Badge color={ti.color} bg={ti.bg}>{ti.label}</Badge>
                </div>
                {role === "admin" && (
                  <div className="flex gap-2 mt-2">
                    <Btn size="sm" variant="ghost" icon={Pencil} onClick={() => setModal(c)}>Editar</Btn>
                    <Btn size="sm" variant="danger" icon={Trash2} onClick={() => setCalendario(calendario.filter((x) => x.id !== c.id))}>Eliminar</Btn>
                  </div>
                )}
              </Card>
            );
          })}
        </div>
      )}
      {modal && (
        <CalendarioForm initial={modal === "new" ? null : modal} onClose={() => setModal(null)} onSave={(d) => {
          if (modal === "new") setCalendario([...calendario, { ...d, id: uid() }]);
          else setCalendario(calendario.map((x) => (x.id === modal.id ? { ...x, ...d } : x)));
          setModal(null); notify("Guardado");
        }} />
      )}
      {lightbox && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: "rgba(0,0,0,0.85)" }} onClick={() => setLightbox(null)}>
          <img src={lightbox} alt="" className="max-w-full max-h-full rounded-xl" />
        </div>
      )}
    </div>
  );
}

function Agenda({ eventos, calendario, comunicados }) {
  const items = useMemo(() => {
    const hoy = todayISO();
    const futuro30 = new Date(); futuro30.setDate(futuro30.getDate() + 30);
    const limite = futuro30.toISOString().slice(0, 10);
    const a = [
      ...eventos.map((e) => ({ fecha: e.fecha, titulo: e.titulo, tipo: "Evento AMPA", icon: CalendarDays, color: C.blue, bg: "#E4EDF5" })),
      ...calendario.map((c) => ({ fecha: c.fecha, titulo: c.titulo, tipo: (TIPO_INFO[c.tipo] || TIPO_INFO.centro).label, icon: CalendarClock, color: C.coral, bg: "#FBE9E7" })),
    ];
    return a.filter((x) => x.fecha >= hoy && x.fecha <= limite).sort((x, y) => x.fecha.localeCompare(y.fecha));
  }, [eventos, calendario]);

  return (
    <div>
      <SectionTitle>Agenda (próximos 30 días)</SectionTitle>
      {items.length === 0 ? <Empty icon={ListChecks} text="No hay nada previsto en los próximos 30 días." /> : (
        <div className="space-y-2">
          {items.map((it, i) => (
            <Card key={i}>
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style={{ background: it.bg }}>
                  <it.icon size={17} color={it.color} />
                </div>
                <div className="flex-1">
                  <p style={{ fontWeight: 700, color: C.ink, fontSize: 13.5 }}>{it.titulo}</p>
                  <p style={{ fontSize: 11.5, color: C.inkSoft, textTransform: "capitalize" }}>{fmtDateLong(it.fecha)} · {it.tipo}</p>
                </div>
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}
